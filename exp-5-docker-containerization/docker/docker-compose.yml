version: '3.9'

services:
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: mlops-api
    image: mlops-inference:latest
    ports:
      - "8000:8000"
    volumes:
      - ../exp-4-fastapi-inference/models:/app/models
      - ../logs:/app/logs
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_DEBUG=False
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge